name: tailorsync
description: AI-powered tailoring management mobile app
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.0.0
  go_router: ^6.0.0
  dio: ^5.0.0
  flutter_secure_storage: ^8.0.0
  cached_network_image: ^3.2.0
  image_picker: ^0.8.7
  syncfusion_flutter_charts: ^20.2.48
  google_fonts: ^8.1.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/patterns/
